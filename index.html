<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AwaazNexus – Community, Q&A, Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .phone {
            max-width: 380px;
            width: 100%;
            height: 700px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .status-bar {
            padding: 12px 20px 4px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            background: white;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }
        /* 5 tabs – smaller icons */
        .bottom-tabs {
            display: flex;
            justify-content: space-around;
            background: white;
            border-top: 1px solid #e9eef3;
            padding: 6px 8px 12px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            color: #8e9aaf;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            flex: 1;
            text-align: center;
        }
        .tab-item i { font-size: 18px; }   /* smaller icons */
        .tab-item.active { color: #0f3b2c; }
        .top-tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1.5px solid #eef2f8;
            margin-bottom: 18px;
            padding-bottom: 6px;
        }
        .top-tab-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #6c7a91;
            padding: 6px 0;
            cursor: pointer;
            position: relative;
        }
        .top-tab-btn.active { color: #0f3b2c; }
        .top-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 0;
            width: 100%;
            height: 2.5px;
            background: #0f3b2c;
            border-radius: 2px;
        }
        .post-card, .product-card, .order-card {
            background: white;
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #edf2f7;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: #e3f5ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0f3b2c;
        }
        .post-img {
            width: 100%;
            border-radius: 20px;
            margin: 10px 0;
            max-height: 180px;
            object-fit: cover;
        }
        .event-badge {
            background: #fef3c7;
            color: #b45309;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .product-price { font-weight: 700; color: #0f3b2c; font-size: 16px; }
        .order-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-shipped { background: #dbeafe; color: #1e40af; }
        .status-delivered { background: #d1fae5; color: #065f46; }
        .marketplace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        button {
            background: #0f3b2c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .circle-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .join-btn {
            background: transparent;
            border: 1px solid #0f3b2c;
            color: #0f3b2c;
        }
        .search-circle {
            background: #f8fafc;
            border-radius: 40px;
            padding: 10px 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            border: 1px solid #e2edf7;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            cursor: pointer;
        }
        footer { font-size: 10px; text-align: center; margin-top: 20px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar"><span>9:41</span><span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span></div>
    <div class="main-content" id="mainContent"></div>
    <div class="bottom-tabs">
        <button class="tab-item" data-tab="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="tab-item" data-tab="meetup"><i class="fas fa-comments"></i><span>Meetup</span></button>
        <button class="tab-item" data-tab="quickget"><i class="fas fa-bolt"></i><span>Quick Get</span></button>
        <button class="tab-item" data-tab="market"><i class="fas fa-store"></i><span>Market</span></button>
        <button class="tab-item" data-tab="profile"><i class="fas fa-user"></i><span>Profile</span></button>
    </div>
</div>

<script>
    // ---------- MOCK DATA ----------
    let currentUser = {
        name: "Hamza Ali",
        points: 2450,
        trustScore: 892,
        circle: "Gulshan Block 5",
        avatar: "HA"
    };

    // Home: text-only posts (Add post tab)
    let textOnlyPosts = [
        { id: 1, circle: "Gulshan Block 5", userName: "Sana K.", avatar: "SK", text: "Does anyone know a good electrician? Urgent! Lights flickering.", likes: 8, comments: 3, timestamp: "2h ago" },
        { id: 2, circle: "Defence Phase 2 (followed)", userName: "Omar R.", avatar: "OR", text: "Lost my cat near Park Lane. Simba, white & brown.", likes: 15, comments: 6, timestamp: "5h ago" }
    ];

    // Events & Media (with images)
    let eventsMediaPosts = [
        { id: 101, circle: "Gulshan Block 5", userName: "Sana K.", avatar: "SK", text: "🐕 Found a lost puppy near KFC! Blue collar.", image: "https://picsum.photos/id/169/300/180", likes: 34, comments: 7, timestamp: "1h ago", type: "post" },
        { id: 102, circle: "Defence Phase 2", userName: "Omar R.", avatar: "OR", text: "Street cleaning drive tomorrow 8 AM at Y Block.", image: "https://picsum.photos/id/116/300/180", likes: 27, comments: 9, timestamp: "3h ago", type: "event" }
    ];

    // Products for Market tab
    let products = [
        { id: 1, name: "Organic Basmati Rice", price: 450, business: "Kissan Store", image: "https://picsum.photos/id/127/150/150", unit: "5kg" },
        { id: 2, name: "Handmade Leather Wallet", price: 899, business: "Artisan Leather", image: "https://picsum.photos/id/20/150/150" },
        { id: 3, name: "Electric Kettle 1.5L", price: 2450, business: "HomeAppliances", image: "https://picsum.photos/id/26/150/150" },
        { id: 4, name: "Kids Story Book Set", price: 600, business: "Readers Hub", image: "https://picsum.photos/id/24/150/150" }
    ];

    // Order history
    let orders = [
        { id: 101, productName: "Organic Basmati Rice", quantity: 2, total: 900, status: "delivered", date: "2025-03-20" },
        { id: 102, productName: "Handmade Leather Wallet", quantity: 1, total: 899, status: "shipped", date: "2025-04-01" }
    ];

    // Meetup data
    let chatList = [
        { id: 1, name: "Ayesha Siddiqui", avatar: "AS", lastMsg: "Thanks for the help!", time: "10:32", unread: 2 },
        { id: 2, name: "Bilal Ahmed", avatar: "BA", lastMsg: "See you at meetup", time: "09:15", unread: 0 }
    ];
    let friendSuggestions = [
        { id: 101, name: "Fatima Zafar", avatar: "FZ", mutualCircle: "Gulshan Block 5" },
        { id: 102, name: "Rizwan Khan", avatar: "RK", mutualCircle: "Defence Phase 2" }
    ];

    // Quick Get questions
    let locationSpecificQuestions = [
        { id: 201, title: "Current petrol price at PSO Anarkali?", location: "Anarkali", askedBy: "Ali", answers: 3, timeAgo: "15 min" },
        { id: 202, title: "Is road open near Kalma Chowk?", location: "Kalma Chowk", askedBy: "Zara", answers: 2, timeAgo: "45 min" }
    ];
    let circleMemberQuestions = [
        { id: 301, circle: "Gulshan Block 5", question: "Any electrician available right now?", askedBy: "Nadia", replies: 4, timeAgo: "1h" }
    ];

    // Notifications (shown inside Profile)
    let notificationsList = [
        { text: "Your answer was rated 5★! +24 points", time: "10 min ago" },
        { text: "New question in Gulshan Block 5", time: "1h ago" }
    ];

    // All circles for join tab
    let allCircles = ["Gulshan Block 5", "Defence Phase 2", "Johar Town", "Clifton Block 8", "PECHS"];

    // UI state
    let homeSubTab = "posts";     // posts / joincircle / eventsmedia
    let meetupSubTab = "chats";
    let quickSubTab = "location";
    let marketSubTab = "products"; // products or orders
    let activeMainTab = "home";

    // Helper: inject ads (two ads into posts feed)
    let adsList = [
        { id: "ad1", business: "Khan Electronics", text: "20% off on inverters! Free installation.", cta: "Shop Now", image: "https://picsum.photos/id/0/300/100" },
        { id: "ad2", business: "FreshMart Grocery", text: "Fresh veg delivered. Use code Awaaz10.", cta: "Order", image: "https://picsum.photos/id/13/300/100" }
    ];
    function injectAds(contentHtml) {
        let ad1 = `<div class="post-card" style="background:#fef9e3; border-left:4px solid #f59e0b;">
                    <div class="post-header"><div class="avatar"><i class="fas fa-ad"></i></div><div><span class="user-name">Sponsored</span><span style="background:#e2e3e5; font-size:11px; padding:2px 8px; border-radius:20px; margin-left:8px;">Ad</span></div></div>
                    <img src="${adsList[0].image}" class="post-img"><div class="post-text"><strong>${adsList[0].business}</strong><br>${adsList[0].text}</div>
                    <button style="background:#f59e0b;">${adsList[0].cta}</button>
                </div>`;
        let ad2 = `<div class="post-card" style="background:#f0f9ff; border-left:4px solid #3b82f6;">
                    <div class="post-header"><div class="avatar"><i class="fas fa-ad"></i></div><div><span class="user-name">Sponsored</span><span style="background:#e2e3e5; font-size:11px; padding:2px 8px; border-radius:20px; margin-left:8px;">Ad</span></div></div>
                    <img src="${adsList[1].image}" class="post-img"><div class="post-text"><strong>${adsList[1].business}</strong><br>${adsList[1].text}</div>
                    <button style="background:#3b82f6;">${adsList[1].cta}</button>
                </div>`;
        // Insert after first post
        let parts = contentHtml.split('</div>');
        if (parts.length > 2) return parts.slice(0,2).join('</div>') + ad1 + parts.slice(2).join('</div>').replace(/(<div class="post-card")/, ad2 + '$1');
        return contentHtml + ad1 + ad2;
    }

    // ---------- RENDER FUNCTIONS ----------
    function renderHome() {
        let html = `<div class="top-tabs">
                        <button class="top-tab-btn ${homeSubTab === 'posts' ? 'active' : ''}" data-home-tab="posts">📝 Add post</button>
                        <button class="top-tab-btn ${homeSubTab === 'joincircle' ? 'active' : ''}" data-home-tab="joincircle">➕ Join circle</button>
                        <button class="top-tab-btn ${homeSubTab === 'eventsmedia' ? 'active' : ''}" data-home-tab="eventsmedia">🎉 Events & Media</button>
                    </div>`;
        if (homeSubTab === "posts") {
            html += `<button id="createTextPostBtn" style="margin-bottom:16px;"><i class="fas fa-edit"></i> Write text update</button>`;
            let postsHtml = '';
            textOnlyPosts.forEach(p => {
                postsHtml += `<div class="post-card">
                                <div class="post-header"><div class="avatar">${p.avatar}</div><div><div class="user-name">${p.userName}</div><div class="circle-badge">${p.circle}</div></div></div>
                                <div class="post-text">${p.text}</div>
                                <div class="post-stats"><span><i class="far fa-heart"></i> ${p.likes}</span><span><i class="far fa-comment"></i> ${p.comments}</span><span>${p.timestamp}</span></div>
                                <div class="input-row"><input placeholder="Write a comment..."><button class="reply-post">Reply</button></div>
                            </div>`;
            });
            html += injectAds(postsHtml);
        } else if (homeSubTab === "joincircle") {
            html += `<div class="search-circle"><i class="fas fa-search"></i><input id="circleSearch" placeholder="Search circle..."></div><div id="circleList"></div>`;
            setTimeout(() => {
                const container = document.getElementById("circleList");
                if(container) container.innerHTML = allCircles.map(c => `<div class="circle-item"><span><i class="fas fa-map-marker-alt"></i> ${c}</span><button class="join-circle" data-circle="${c}">Join</button></div>`).join('');
                document.querySelectorAll(".join-circle").forEach(btn => btn.onclick = () => alert(`Joined ${btn.dataset.circle}`));
                document.getElementById("circleSearch")?.addEventListener("input", (e) => {
                    let term = e.target.value.toLowerCase();
                    let filtered = allCircles.filter(c => c.toLowerCase().includes(term));
                    document.getElementById("circleList").innerHTML = filtered.map(c => `<div class="circle-item"><span>${c}</span><button class="join-circle" data-circle="${c}">Join</button></div>`).join('');
                });
            }, 10);
        } else if (homeSubTab === "eventsmedia") {
            let eventsHtml = '';
            eventsMediaPosts.forEach(e => {
                eventsHtml += `<div class="post-card">
                                <div class="post-header"><div class="avatar">${e.avatar}</div><div><div class="user-name">${e.userName}</div><div class="circle-badge">${e.circle}</div></div></div>
                                ${e.type === 'event' ? '<div class="event-badge">Event</div>' : ''}
                                <div class="post-text">${e.text}</div><img src="${e.image}" class="post-img">
                                <div class="post-stats"><span><i class="far fa-heart"></i> ${e.likes}</span><span>${e.timestamp}</span></div>
                            </div>`;
            });
            html += eventsHtml;
        }
        return html;
    }

    function renderMarket() {
        let html = `<div class="top-tabs">function renderQuickGet() {
        let html = `<div class="top-tabs"><button class="top-tab-btn ${quickSubTab === 'location' ? 'active' : ''}" data-quick-tab="location">📍 Location Q</button><button class="top-tab-btn ${quickSubTab === 'circle' ? 'active' : ''}" data-quick-tab="circle">🏠 Circle Q</button><button class="top-tab-btn ${quickSubTab === 'ask' ? 'active' : ''}" data-quick-tab="ask">❓ Ask</button></div>`;
        if (quickSubTab === "location") {
            locationSpecificQuestions.forEach(q => {
                html += `<div class="post-card"><strong>${q.title}</strong><div style="font-size:12px;">📍 ${q.location} • ${q.timeAgo}</div><div class="input-row"><input placeholder="Your answer..."><button class="answerQ">Reply</button></div></div>`;
            });
        } else if (quickSubTab === "circle") {
            circleMemberQuestions.forEach(q => {
                html += `<div class="post-card"><div>${q.circle} • ${q.question}</div><div class="input-row"><input placeholder="Reply..."><button class="answerCircle">Reply</button></div></div>`;
            });
        } else {
            html += `<div class="post-card"><textarea id="newQ" rows="2" placeholder="Ask anything (free 10/day)..."></textarea><button id="askBtn">Ask Question</button></div>`;
        }
        return html;
    }

    function renderProfile() {
        let notificationBadge = notificationsList.length > 0 ? `<span style="background:#e53e3e; color:white; border-radius:50%; font-size:10px; padding:2px 6px; margin-left:6px;">${notificationsList.length}</span>` : '';
        return `<div class="post-card" style="text-align:center;">
                    <div class="avatar" style="margin:0 auto;">${currentUser.avatar}</div>
                    <h2>${currentUser.name}</h2>
                    <div>⭐ ${currentUser.points} pts | Trust ${currentUser.trustScore}</div>
                    <div><i class="fas fa-circle-nodes"></i> ${currentUser.circle}</div>
                    <hr style="margin:16px 0;">
                    <div class="settings-item" id="showNotifications"><span><i class="fas fa-bell"></i> Notifications ${notificationBadge}</span><i class="fas fa-chevron-right"></i></div>
                    <div class="settings-item"><span><i class="fas fa-user-edit"></i> Edit Profile</span><i class="fas fa-chevron-right"></i></div>
                    <div class="settings-item"><span><i class="fas fa-lock"></i> Privacy & Security</span><i class="fas fa-chevron-right"></i></div>
                    <button id="premiumBtn" style="margin-top:16px;">✨ Upgrade Premium (Rs 1000/mo)</button>
                    <footer>Apki awaz hai kisi ka sahara</footer>
                </div>`;
    }

    function renderNotificationsPopup() {
        // Simple modal simulation: alert with list
        let msg = notificationsList.map(n => `${n.text} (${n.time})`).join('\n');
        alert("🔔 Notifications:\n" + (msg || "No new notifications"));
    }

    function renderAll() {
        const container = document.getElementById("mainContent");
        if (!container) return;
        let content = "";
        if (activeMainTab === "home") content = renderHome();
        else if (activeMainTab === "meetup") content = renderMeetup();
        else if (activeMainTab === "quickget") content = renderQuickGet();
        else if (activeMainTab === "market") content = renderMarket();
        else if (activeMainTab === "profile") content = renderProfile();
        container.innerHTML = content;
        attachDynamicEvents();
    }

    function attachDynamicEvents() {
        // Home tab toggles
        document.querySelectorAll("[data-home-tab]").forEach(btn => btn.addEventListener("click", (e) => { homeSubTab = e.target.dataset.homeTab; renderAll(); }));
        document.querySelectorAll("[data-meetup-tab]").forEach(btn => btn.addEventListener("click", (e) => { meetupSubTab = e.target.dataset.meetupTab; renderAll(); }));
        document.querySelectorAll("[data-quick-tab]").forEach(btn => btn.addEventListener("click", (e) => { quickSubTab = e.target.dataset.quickTab; renderAll(); }));
        document.querySelectorAll("[data-market-tab]").forEach(btn => btn.addEventListener("click", (e) => { marketSubTab = e.target.dataset.marketTab; renderAll(); }));

        // Create text post
        document.getElementById("createTextPostBtn")?.addEventListener("click", () => {
            let txt = prompt("Write your text update:");
            if (txt) { textOnlyPosts.unshift({ id: Date.now(), circle: currentUser.circle, userName: currentUser.name, avatar: currentUser.avatar, text: txt, likes: 0, comments: 0, timestamp: "just now" }); renderAll(); }
        });

        // Order products
        document.querySelectorAll(".order-product").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let name = btn.dataset.name;
                let price = parseInt(btn.dataset.price);
                let qty = prompt("Quantity:", "1");
                if (qty && !isNaN(qty)) {
                    let newOrder = { id: Date.now(), productName: name, quantity: parseInt(qty), total: price * parseInt(qty), status: "pending", date: new Date().toISOString().slice(0,10) };
                    orders.unshift(newOrder);
                    alert(`Order placed for ${name}. Status: pending.`);
                    if (marketSubTab === "products") renderAll();
                }
            });
        });

        document.querySelectorAll(".reply-post, .answerQ, .answerCircle").forEach(btn => btn.addEventListener("click", () => alert("Reply posted (demo) +points if rated.")));
        document.getElementById("askBtn")?.addEventListener("click", () => alert("Question posted (free)."));
        document.querySelectorAll(".addFriend").forEach(btn => btn.addEventListener("click", (e) => alert(`Friend request sent to ${btn.dataset.name}`)));
        document.getElementById("premiumBtn")?.addEventListener("click", () => alert("Upgrade to premium: unlimited questions, no ads."));
        document.getElementById("showNotifications")?.addEventListener("click", () => renderNotificationsPopup());
    }

    // Bottom tab listeners
    document.querySelectorAll(".tab-item").forEach(tab => {
        tab.addEventListener("click", () => {
            activeMainTab = tab.dataset.tab;
            document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            renderAll();
        });
    });
    document.querySelector(".tab-item[data-tab='home']").classList.add("active");
    renderAll();
</script>
</body>
</html>
