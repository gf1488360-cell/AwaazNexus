<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AwaazNexus – Your Voice, Someone's Support</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .phone {
            max-width: 400px;
            width: 100%;
            height: 720px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .status-bar {
            padding: 12px 20px 4px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            background: white;
            color: #1e293b;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }
        .bottom-tabs {
            display: flex;
            justify-content: space-around;
            background: white;
            border-top: 1px solid #e9eef3;
            padding: 8px 12px 14px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #8e9aaf;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .tab-item i { font-size: 22px; }
        .tab-item.active { color: #0f3b2c; }
        .top-tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1.5px solid #eef2f8;
            margin-bottom: 18px;
            padding-bottom: 6px;
        }
        .top-tab-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #6c7a91;
            padding: 6px 0;
            cursor: pointer;
            position: relative;
        }
        .top-tab-btn.active { color: #0f3b2c; }
        .top-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 0;
            width: 100%;
            height: 2.5px;
            background: #0f3b2c;
            border-radius: 2px;
        }
        .post-card, .event-card, .question-card {
            background: white;
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: #e3f5ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0f3b2c;
        }
        .post-img {
            width: 100%;
            border-radius: 20px;
            margin: 10px 0;
            max-height: 200px;
            object-fit: cover;
            background: #eef2f8;
        }
        .user-name { font-weight: 700; font-size: 15px; }
        .circle-badge { font-size: 11px; color: #5b6e8c; }
        .post-stats {
            display: flex;
            gap: 18px;
            margin-top: 10px;
            font-size: 13px;
            color: #5b6e8c;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
        }
        button {
            background: #0f3b2c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .join-btn {
            background: transparent;
            border: 1px solid #0f3b2c;
            color: #0f3b2c;
            padding: 6px 16px;
        }
        .search-circle {
            background: #f8fafc;
            border-radius: 40px;
            padding: 10px 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            border: 1px solid #e2edf7;
        }
        .circle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 6px 0;
        }
        .event-badge {
            background: #fef3c7;
            color: #b45309;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            cursor: pointer;
        }
        footer {
            font-size: 10px;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span>9:41</span>
        <span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span>
    </div>
    <div class="main-content" id="mainContent"></div>
    <div class="bottom-tabs">
        <button class="tab-item" data-tab="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="tab-item" data-tab="meetup"><i class="fas fa-comments"></i><span>Meetup</span></button>
        <button class="tab-item" data-tab="quickget"><i class="fas fa-bolt"></i><span>Quick Get</span></button>
        <button class="tab-item" data-tab="notifications"><i class="fas fa-bell"></i><span>Notify</span></button>
        <button class="tab-item" data-tab="profile"><i class="fas fa-user"></i><span>Profile</span></button>
    </div>
</div>

<script>
    // ----- USER DATA -----
    let currentUser = {
        name: "Hamza Ali",
        points: 2110,
        trustScore: 872,
        circle: "Gulshan Block 5",
        avatar: "HA",
        email: "hamza@awaaz.com",
        phone: "+92 3XX 1234567"
    };

    // ----- Community Posts (TEXT-ONLY for "Add post" tab) -----
    let textOnlyPosts = [
        { id: 1, circle: "Gulshan Block 5", userName: "Sana K.", avatar: "SK", text: "Does anyone know a good electrician? Urgent! Lights flickering since morning.", likes: 8, comments: 3, timestamp: "2h ago" },
        { id: 2, circle: "Defence Phase 2 (followed)", userName: "Omar R.", avatar: "OR", text: "Lost my cat near Park Lane. Name: Simba, white with brown patches. Please help!", likes: 15, comments: 6, timestamp: "5h ago" },
        { id: 3, circle: "Gulshan Block 5", userName: "Zainab T.", avatar: "ZT", text: "Anyone selling a used study table? Budget around 3k.", likes: 4, comments: 2, timestamp: "yesterday" }
    ];

    // ----- EVENTS & MEDIA posts (with context-matching images) -----
    let eventsMediaPosts = [
        { id: 101, circle: "Gulshan Block 5", userName: "Sana K.", avatar: "SK", text: "🐕 FOUND a lost puppy near KFC Gulshan! Very friendly, wearing blue collar. Contact me to claim.", image: "https://picsum.photos/id/169/300/180", likes: 34, comments: 7, timestamp: "1h ago", type: "post" },
        { id: 102, circle: "Defence Phase 2 (followed)", userName: "Omar R.", avatar: "OR", text: "Street cleaning drive tomorrow at 8 AM near Y Block. Join us to keep our neighborhood clean!", image: "https://picsum.photos/id/116/300/180", likes: 27, comments: 9, timestamp: "3h ago", type: "event" },
        { id: 103, circle: "Gulshan Block 5", userName: "Zainab T.", avatar: "ZT", text: "Free iftar gathering at Community Center, 6:30 PM. Bring a dish to share! Everyone welcome.", image: "https://picsum.photos/id/127/300/180", likes: 52, comments: 14, timestamp: "6h ago", type: "event" },
        { id: 104, circle: "Johar Town (followed)", userName: "Bilal A.", avatar: "BA", text: "Beautiful sunset at Racecourse Park – perfect evening for a walk 🌅", image: "https://picsum.photos/id/96/300/180", likes: 41, comments: 5, timestamp: "yesterday", type: "post" }
    ];

    let followedCircles = ["Defence Phase 2", "Johar Town", "Clifton"];
    
    // Meetup data
    let chatList = [
        { id: 1, name: "Ayesha Siddiqui", avatar: "AS", lastMsg: "Thanks for the recommendation!", time: "10:32", unread: 2 },
        { id: 2, name: "Bilal Ahmed", avatar: "BA", lastMsg: "See you at the circle meetup", time: "09:15", unread: 0 },
        { id: 3, name: "Dr. Noman", avatar: "DN", lastMsg: "Clinic timings changed", time: "07:50", unread: 1 }
    ];
    let friendSuggestions = [
        { id: 101, name: "Fatima Zafar", avatar: "FZ", mutualCircle: "Gulshan Block 5" },
        { id: 102, name: "Rizwan Khan", avatar: "RK", mutualCircle: "Defence Phase 2" },
        { id: 103, name: "Mahnoor Ali", avatar: "MA", mutualCircle: "Johar Town" }
    ];

    // Quick Get questions
    let locationSpecificQuestions = [
        { id: 201, title: "Current petrol price at PSO Anarkali?", location: "Anarkali", askedBy: "Ali", answers: 3, timeAgo: "15 min" },
        { id: 202, title: "Is road open near Kalma Chowk?", location: "Kalma Chowk", askedBy: "Zara", answers: 2, timeAgo: "45 min" },
        { id: 203, title: "Which pharmacy has augmentin near DHA Phase 2?", location: "DHA Phase 2", askedBy: "Sarah", answers: 1, timeAgo: "2h" }
    ];
    let circleMemberQuestions = [
        { id: 301, circle: "Gulshan Block 5", question: "Any electrician available right now?", askedBy: "Nadia", replies: 4, timeAgo: "1h" },
        { id: 302, circle: "Defence Phase 2 (followed)", question: "Best mandi near Y block?", askedBy: "Hamza", replies: 6, timeAgo: "3h" },
        { id: 303, circle: "Gulshan Block 5", question: "Gas pressure low? Anyone else?", askedBy: "Khalid", replies: 2, timeAgo: "30 min" }
    ];

    let notificationsList = [
        { text: "Your answer was rated 5★! +24 points", time: "10 min ago" },
        { text: "New question in Gulshan Block 5: 'Where to get printer refill?'", time: "1h ago" },
        { text: "You earned 50 points for weekly streak!", time: "yesterday" },
        { text: "Sana K. replied to your question about electricity", time: "2h ago" }
    ];

    // All circles for join tab
    let allCircles = [
        "Gulshan Block 5", "Defence Phase 2", "Johar Town", "Clifton Block 8", "PECHS", 
        "Gulistan-e-Jauhar", "North Nazimabad", "Bahria Town Rawalpindi", "Faisalabad Peoples Colony", 
        "Model Town Lahore", "Saddar Rawalpindi", "DHA Karachi Phase 8"
    ];

    // UI state
    let homeSubTab = "posts";    // "posts", "joincircle", "eventsmedia"
    let meetupSubTab = "chats";
    let quickSubTab = "location";
    let activeMainTab = "home";

    // ---------- RENDER FUNCTIONS ----------
    function renderHome() {
        let html = `<div class="top-tabs" id="homeTopTabs">
                        <button class="top-tab-btn ${homeSubTab === 'posts' ? 'active' : ''}" data-home-tab="posts">📝 Add post</button>
                        <button class="top-tab-btn ${homeSubTab === 'joincircle' ? 'active' : ''}" data-home-tab="joincircle">➕ Join circle</button>
                        <button class="top-tab-btn ${homeSubTab === 'eventsmedia' ? 'active' : ''}" data-home-tab="eventsmedia">🎉 Events & Media</button>
                    </div>`;

        if (homeSubTab === "posts") {
            // TEXT-ONLY posts
            html += `<div style="margin-bottom: 16px;"><button id="createTextPostBtn" style="background:#0f3b2c;"><i class="fas fa-edit"></i> Write text update</button></div>`;
            textOnlyPosts.forEach(post => {
                html += `<div class="post-card">
                            <div class="post-header">
                                <div class="avatar">${post.avatar}</div>
                                <div><div class="user-name">${post.userName}</div><div class="circle-badge"><i class="fas fa-circle-nodes"></i> ${post.circle}</div></div>
                            </div>
                            <div class="post-text">${post.text}</div>
                            <div class="post-stats">
                                <span><i class="far fa-heart"></i> ${post.likes}</span>
                                <span><i class="far fa-comment"></i> ${post.comments}</span>
                                <span>${post.timestamp}</span>
                            </div>
                            <div class="input-row">
                                <input type="text" placeholder="Write a comment..." id="commentText-${post.id}">
                                <button class="reply-text-post" data-id="${post.id}">Reply</button>
                            </div>
                        </div>`;
            });
        } 
        else if (homeSubTab === "joincircle") {
            html += `<div class="search-circle">
                        <i class="fas fa-search"></i>
                        <input type="text" id="circleSearchInput" placeholder="Search circle by name...">
                    </div>
                    <div id="circleSearchResults"></div>
                    <h4><i class="fas fa-star"></i> Popular circles near you</h4>
                    <div id="allCirclesList"></div>`;
            setTimeout(() => {
                const container = document.getElementById("allCirclesList");
                if (container) {
                    container.innerHTML = allCircles.map(c => `<div class="circle-item"><span><i class="fas fa-map-marker-alt"></i> ${c}</span><button class="join-circle-btn" data-circle="${c}">Join</button></div>`).join('');
                }
                const searchInput = document.getElementById("circleSearchInput");
                if (searchInput) {
                    searchInput.addEventListener("input", (e) => {
                        const term = e.target.value.toLowerCase();
                        const filtered = allCircles.filter(c => c.toLowerCase().includes(term));
                        const resultsDiv = document.getElementById("circleSearchResults");
                        if (resultsDiv) resultsDiv.innerHTML = filtered.map(c => `<div class="circle-item"><span>${c}</span><button class="join-circle-btn" data-circle="${c}">Join</button></div>`).join('');
                    });
                }
                document.querySelectorAll(".join-circle-btn").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        const circleName = btn.getAttribute("data-circle");
                        alert(`🎉 You requested to join "${circleName}" circle! (Demo)`);
                    });
                });
            }, 10);
        }
        else if (homeSubTab === "eventsmedia") {
            if (eventsMediaPosts.length === 0) html += `<p>No events or media yet. Be the first to share!</p>`;
            eventsMediaPosts.forEach(post => {
                html += `<div class="post-card">
                            <div class="post-header">
                                <div class="avatar">${post.avatar}</div>
                                <div><div class="user-name">${post.userName}</div><div class="circle-badge">${post.circle}</div></div>
                            </div>`;
                if (post.type === "event") html += `<div class="event-badge"><i class="fas fa-calendar-check"></i> Event</div>`;
                html += `<div class="post-text">${post.text}</div>`;
                if (post.image) html += `<img src="${post.image}" class="post-img" alt="post content">`;
                html += `<div class="post-stats"><span><i class="far fa-heart"></i> ${post.likes}</span><span><i class="far fa-comment"></i> ${post.comments}</span><span>${post.timestamp}</span></div>
                        <div class="input-row"><input placeholder="React or comment..." id="eventComment-${post.id}"><button class="event-reply" data-id="${post.id}">❤️ Like</button></div>
                    </div>`;
            });
        }
        return html;
    }

    function renderMeetup() {
        let html = `<div class="top-tabs" id="meetupTopTabs">
                        <button class="top-tab-btn ${meetupSubTab === 'chats' ? 'active' : ''}" data-meetup-tab="chats">💬 Chats</button>
                        <button class="top-tab-btn ${meetupSubTab === 'friends' ? 'active' : ''}" data-meetup-tab="friends">👥 Find Friend</button>
                    </div>`;
        if (meetupSubTab === "chats") {
            chatList.forEach(chat => {
                html += `<div class="post-card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; gap:12px;"><div class="avatar">${chat.avatar}</div><div><strong>${chat.name}</strong><div style="font-size:13px;">${chat.lastMsg}</div></div></div>
                            <div>${chat.unread ? `<span style="background:#0f3b2c; color:white; border-radius:20px; padding:2px 8px;">${chat.unread}</span>` : `<span style="font-size:11px;">${chat.time}</span>`}</div>
                        </div>`;
            });
        } else {
            friendSuggestions.forEach(f => {
                html += `<div class="post-card" style="display:flex; justify-content:space-between;">
                            <div style="display:flex; gap:12px;"><div class="avatar">${f.avatar}</div><div><strong>${f.name}</strong><div style="font-size:12px;">${f.mutualCircle}</div></div></div>
                            <button class="sendFriendReqBtn" data-name="${f.name}">Add Friend</button>
                        </div>`;
            });
        }
        return html;
    }

    function renderQuickGet() {
        let html = `<div class="top-tabs" id="quickTopTabs">
                        <button class="top-tab-btn ${quickSubTab === 'location' ? 'active' : ''}" data-quick-tab="location">📍 Location Q</button>
                        <button class="top-tab-btn ${quickSubTab === 'circle' ? 'active' : ''}" data-quick-tab="circle">🏠 Circle Q</button>
                        <button class="top-tab-btn ${quickSubTab === 'ask' ? 'active' : ''}" data-quick-tab="ask">❓ Ask</button>
                    </div>`;
        if (quickSubTab === "location") {
            locationSpecificQuestions.forEach(q => {
                html += `<div class="question-card">
                            <div><strong>${q.title}</strong><div style="font-size:12px;">📍 ${q.location} • asked by ${q.askedBy} • ${q.timeAgo}</div></div>
                            <div class="post-stats">${q.answers} answers</div>
                            <div class="input-row"><input placeholder="Your answer (photo/GPS mock)" id="ansLoc-${q.id}"><button class="replyLocBtn" data-id="${q.id}">Reply</button></div>
                        </div>`;
            });
        } else if (quickSubTab === "circle") {
            circleMemberQuestions.forEach(q => {
                html += `<div class="question-card">
                            <div><span class="circle-badge"><i class="fas fa-circle"></i> ${q.circle}</span> • <span>by ${q.askedBy}, ${q.timeAgo}</span></div>
                            <div class="post-text"><strong>❓ ${q.question}</strong></div>
                            <div class="post-stats">💬 ${q.replies} replies</div>
                            <div class="input-row"><input placeholder="Reply..." id="replyCircle-${q.id}"><button class="replyCircleBtn" data-id="${q.id}">Reply</button></div>
                        </div>`;
            });
        } else {
            html += `<div class="post-card">
                        <textarea id="newQuestionText" rows="2" placeholder="Ask anything about prices, roads, utilities..." style="width:100%; border-radius:20px; padding:12px; border:1px solid #e2e8f0;"></textarea>
                        <div style="margin: 12px 0;"><input type="text" id="questionLocation" placeholder="📍 Attach location (optional, for geofenced question)" style="width:100%; padding:10px; border-radius:30px;"></div>
                        <button id="submitQuestionBtn">📢 Ask Question (free, 1st 10/day)</button>
                        <p style="font-size:12px; margin-top:10px;">💡 Hidden geofenced questions are free. Use points after limit.</p>
                    </div>`;
        }
        return html;
    }

    function renderNotifications() {
        let html = `<h3 style="margin-bottom:16px;">🔔 Notifications</h3>`;
        notificationsList.forEach(n => {
            html += `<div class="post-card"><i class="fas fa-bell" style="margin-right:12px;"></i> ${n.text}<div style="font-size:11px; color:#7c8ba0;">${n.time}</div></div>`;
        });
        return html;
    }

    function renderProfile() {
        return `<div class="post-card">
                    <div style="text-align:center;">
                        <div class="avatar" style="width:80px; height:80px; margin: 0 auto 12px; font-size:28px;">${currentUser.avatar}</div>
                        <h2>${currentUser.name}</h2>
                        <div style="background:#e3f5ec; border-radius:30px; display:inline-block; padding:6px 16px;"><i class="fas fa-coins"></i> ${currentUser.points} points</div>
                        <p>⭐ Trust Score: ${currentUser.trustScore}</p>
                        <p><i class="fas fa-circle-nodes"></i> Home Circle: ${currentUser.circle}</p>
                    </div>
                    <hr style="margin:16px 0;">
                    <h4><i class="fas fa-sliders-h"></i> Settings</h4>
                    <div class="settings-item" id="editProfileBtn"><span><i class="fas fa-user-edit"></i> Edit Profile</span> <i class="fas fa-chevron-right"></i></div>
                    <div class="settings-item" id="privacyBtn"><span><i class="fas fa-lock"></i> Privacy & Security</span> <i class="fas fa-chevron-right"></i></div>
                    <div class="settings-item" id="notifPrefBtn"><span><i class="fas fa-bell"></i> Notification Preferences</span> <i class="fas fa-chevron-right"></i></div>
                    <div class="settings-item" id="languageBtn"><span><i class="fas fa-language"></i> Language (Urdu/English)</span> <i class="fas fa-chevron-right"></i></div>
                    <hr style="margin:16px 0;">
                    <button id="premiumBtn" style="background:#c2410c; width:100%;">✨ Upgrade Premium (Rs 1000/mo)</button>
                    <div style="margin-top:16px;">
                        <h4>Your impact</h4>
                        <p>✅ Answers given: 63</p>
                        <p>🏆 Longest streak: 21 days</p>
                        <p>❤️ Thanks received: 47</p>
                    </div>
                    <footer>🇵🇰 Apki awaz hai kisi ka sahara</footer>
                </div>`;
    }

    function renderAll() {
        const container = document.getElementById("mainContent");
        if (!container) return;
        let content = "";
        if (activeMainTab === "home") content = renderHome();
        else if (activeMainTab === "meetup") content = renderMeetup();
        else if (activeMainTab === "quickget") content = renderQuickGet();
        else if (activeMainTab === "notifications") content = renderNotifications();
        else if (activeMainTab === "profile") content = renderProfile();
        container.innerHTML = content;
        attachSubTabEvents();
        attachActionButtons();
    }

    function attachSubTabEvents() {
        const homePosts = document.querySelector("[data-home-tab='posts']");
        const homeCircle = document.querySelector("[data-home-tab='joincircle']");
        const homeEvents = document.querySelector("[data-home-tab='eventsmedia']");
        if (homePosts) homePosts.onclick = () => { homeSubTab = "posts"; renderAll(); };
        if (homeCircle) homeCircle.onclick = () => { homeSubTab = "joincircle"; renderAll(); };
        if (homeEvents) homeEvents.onclick = () => { homeSubTab = "eventsmedia"; renderAll(); };

        const meetChats = document.querySelector("[data-meetup-tab='chats']");
        const meetFriends = document.querySelector("[data-meetup-tab='friends']");
        if (meetChats) meetChats.onclick = () => { meetupSubTab = "chats"; renderAll(); };
        if (meetFriends) meetFriends.onclick = () => { meetupSubTab = "friends"; renderAll(); };

        const qLoc = document.querySelector("[data-quick-tab='location']");
        const qCircle = document.querySelector("[data-quick-tab='circle']");
        const qAsk = document.querySelector("[data-quick-tab='ask']");
        if (qLoc) qLoc.onclick = () => { quickSubTab = "location"; renderAll(); };
        if (qCircle) qCircle.onclick = () => { quickSubTab = "circle"; renderAll(); };
        if (qAsk) qAsk.onclick = () => { quickSubTab = "ask"; renderAll(); };
    }

    function attachActionButtons() {
        // Create text-only post
        const createTextBtn = document.getElementById("createTextPostBtn");
        if (createTextBtn) {
            createTextBtn.onclick = () => {
                let postText = prompt("Write your text update (no images):");
                if (postText && postText.trim()) {
                    const newPost = {
                        id: Date.now(),
                        circle: currentUser.circle,
                        userName: currentUser.name,
                        avatar: currentUser.avatar,
                        text: postText,
                        likes: 0,
                        comments: 0,
                        timestamp: "just now"
                    };
                    textOnlyPosts.unshift(newPost);
                    renderAll();
                }
            };
        }
        // Reply to text posts
        document.querySelectorAll(".reply-text-post").forEach(btn => {
            btn.onclick = (e) => {
                const id = btn.getAttribute("data-id");
                alert(`Comment added to post ${id} (demo).`);
            };
        });
        // Reply to location / circle questions
        document.querySelectorAll(".replyLocBtn").forEach(btn => {
            btn.onclick = () => alert("Mock: Answer submitted! Points after rating.");
        });
        document.querySelectorAll(".replyCircleBtn").forEach(btn => {
            btn.onclick = () => alert("Reply added to circle question.");
        });
        const submitQ = document.getElementById("submitQuestionBtn");
        if (submitQ) {
            submitQ.onclick = () => {
                const qText = document.getElementById("newQuestionText")?.value;
                if (!qText) return alert("Please write a question.");
                alert(`Question posted: "${qText}". (Free today)`);
                document.getElementById("newQuestionText").value = "";
                if(document.getElementById("questionLocation")) document.getElementById("questionLocation").value = "";
            };
        }
        // Friend requests
        document.querySelectorAll(".sendFriendReqBtn").forEach(btn => {
            btn.onclick = (e) => alert(`Friend request sent to ${btn.getAttribute("data-name")}`);
        });
        // Premium
        const premium = document.getElementById("premiumBtn");
        if (premium) premium.onclick = () => alert("Premium subscription: unlimited questions, no ads, bonus points.");
        // Event media like
        document.querySelectorAll(".event-reply").forEach(btn => {
            btn.onclick = () => alert("You liked this post!");
        });
        // Profile settings handlers
        const editProfile = document.getElementById("editProfileBtn");
        const privacy = document.getElementById("privacyBtn");
        const notifPref = document.getElementById("notifPrefBtn");
        const lang = document.getElementById("languageBtn");
        if (editProfile) editProfile.onclick = () => alert("Edit Profile (demo): change name, photo, etc.");
        if (privacy) privacy.onclick = () => alert("Privacy & Security: manage data, block list.");
        if (notifPref) notifPref.onclick = () => alert("Choose which notifications to receive.");
        if (lang) lang.onclick = () => alert("Switch between Urdu and English (demo).");
    }

    // Bottom tab listeners
    document.querySelectorAll(".tab-item").forEach(tab => {
        tab.addEventListener("click", () => {
            const tabName = tab.getAttribute("data-tab");
            if (tabName) {
                activeMainTab = tabName;
                document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                renderAll();
            }
        });
    });

    // Initialize
    document.querySelector(".tab-item[data-tab='home']").classList.add("active");
    renderAll();
</script>
</body>
</html>
