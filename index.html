<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AwaazNexus – Apki awaz hai kisi ka sahara</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* Mobile frame */
        .phone {
            max-width: 400px;
            width: 100%;
            height: 700px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Status bar mock */
        .status-bar {
            padding: 12px 20px 4px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            background: white;
            color: #1e293b;
        }

        /* Main scrollable content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px 16px;
            scroll-behavior: smooth;
        }

        /* Bottom tab bar */
        .bottom-tabs {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 10px 12px 14px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.02);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #94a3b8;
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .tab-item i {
            font-size: 22px;
        }

        .tab-item.active {
            color: #0f3b2c;
        }

        /* Top tabs (secondary) */
        .top-tabs {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 16px;
            padding-bottom: 8px;
        }
        .top-tab-btn {
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #64748b;
            padding: 4px 0;
            cursor: pointer;
            position: relative;
        }
        .top-tab-btn.active {
            color: #0f3b2c;
        }
        .top-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0f3b2c;
            border-radius: 2px;
        }

        /* Cards */
        .post-card, .question-card, .chat-card, .friend-card {
            background: white;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eef2f6;
        }
        .post-header, .question-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .avatar {
            width: 42px;
            height: 42px;
            background: #e6f7f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0f3b2c;
        }
        .user-name {
            font-weight: 700;
            font-size: 15px;
        }
        .circle-badge {
            font-size: 11px;
            color: #5b6e8c;
        }
        .post-text {
            font-size: 14px;
            margin: 8px 0;
            line-height: 1.4;
        }
        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 13px;
            color: #5b6e8c;
        }
        .reply-btn, .like-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #5b6e8c;
            font-size: 13px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
        }
        button {
            background: #0f3b2c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .ask-card {
            background: #f8fafc;
            border-radius: 28px;
            padding: 12px;
        }
        .search-circle {
            background: #f1f5f9;
            border-radius: 30px;
            padding: 10px 14px;
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
        }
        .search-circle input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
        }
        .circle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .join-btn {
            background: none;
            border: 1px solid #0f3b2c;
            color: #0f3b2c;
            padding: 4px 12px;
        }
        h4 {
            margin: 8px 0;
        }
        .notification-item {
            padding: 12px 0;
            border-bottom: 1px solid #eef2f6;
            font-size: 14px;
        }
        .profile-section {
            text-align: center;
        }
        .points-badge {
            background: #e6f7f0;
            border-radius: 30px;
            padding: 6px 12px;
            display: inline-block;
        }
        footer {
            font-size: 10px;
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span>9:41</span>
        <span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span>
    </div>
    <div class="main-content" id="mainContent">
        <!-- dynamic content loaded via js -->
        <div id="dynamicPanel">Loading...</div>
    </div>
    <div class="bottom-tabs">
        <button class="tab-item" data-tab="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="tab-item" data-tab="meetup"><i class="fas fa-comments"></i><span>Meetup</span></button>
        <button class="tab-item" data-tab="quickget"><i class="fas fa-bolt"></i><span>Quick Get</span></button>
        <button class="tab-item" data-tab="notifications"><i class="fas fa-bell"></i><span>Notify</span></button>
        <button class="tab-item" data-tab="profile"><i class="fas fa-user"></i><span>Profile</span></button>
    </div>
</div>

<script>
    // ----------------------------- MOCK DATA ----------------------------------
    let currentUser = {
        name: "Hamza Ali",
        points: 1270,
        trustScore: 742,
        circle: "Gulshan Block 5",
        avatar: "HA"
    };

    // Home: community posts (own + followed circles)
    let communityPosts = [
        { id: 1, circle: "Gulshan Block 5", userName: "Sana K.", avatar: "SK", text: "Does anyone know a good electrician? Urgent! 🔌", likes: 5, comments: 2, timestamp: "2h ago", type: "post" },
        { id: 2, circle: "Defence Phase 2 (followed)", userName: "Omar R.", avatar: "OR", text: "Lost my cat near Park Lane. Please help! 📍", likes: 12, comments: 4, timestamp: "5h ago", type: "post" },
        { id: 3, circle: "Gulshan Block 5", userName: "Zainab T.", avatar: "ZT", text: "Free sewing classes this weekend at community center. Register in comments!", likes: 23, comments: 7, timestamp: "yesterday", type: "post" },
    ];

    let followedCircles = ["Defence Phase 2", "Saddar Town"];

    // Meetup: chats + find friends
    let chatList = [
        { id: 1, name: "Ayesha Siddiqui", avatar: "AS", lastMsg: "Thanks for the help yesterday!", time: "10:32", unread: 2 },
        { id: 2, name: "Bilal Ahmed", avatar: "BA", lastMsg: "Meeting at 7pm?", time: "09:15", unread: 0 },
    ];
    let friendSuggestions = [
        { id: 101, name: "Fatima Zafar", avatar: "FZ", mutualCircle: "Gulshan Block 5", status: "add" },
        { id: 102, name: "Rizwan Khan", avatar: "RK", mutualCircle: "Defence Phase 2", status: "add" },
    ];

    // Quick Get questions
    let locationSpecificQuestions = [
        { id: 201, title: "What's the current petrol price at PSO Anarkali?", location: "Anarkali", askedBy: "Ali", answers: 2, timeAgo: "15 min", pinnedLocation: true },
        { id: 202, title: "Is the road open near Kalma Chowk?", location: "Kalma Chowk", askedBy: "Zara", answers: 1, timeAgo: "45 min", pinnedLocation: true },
    ];

    let circleMemberQuestions = [
        { id: 301, circle: "Gulshan Block 5", question: "Any pharmacy open right now near KDA?", askedBy: "Nadia", replies: 3, timeAgo: "1h" },
        { id: 302, circle: "Defence Phase 2 (followed)", question: "Best tikka boti place near Y block?", askedBy: "Hamza", replies: 5, timeAgo: "3h" },
    ];

    let notificationsList = [
        { id: 1, text: "Your answer was rated 5★! +18 points", time: "10 min ago", type: "rating" },
        { id: 2, text: "New question in your circle: 'Where to get printer refill?'", time: "1h ago", type: "circle_q" },
        { id: 3, text: "You earned 50 points for weekly streak!", time: "yesterday", type: "points" },
        { id: 4, text: "Sana K. replied to your question about electricity", time: "2h ago", type: "answer" },
    ];

    // Helper functions for dynamic renders
    function renderHome() {
        let html = `<div class="top-tabs" id="homeTopTabs">
                        <button class="top-tab-btn active" data-home-tab="posts">Add post</button>
                        <button class="top-tab-btn" data-home-tab="circles">Join circle</button>
                    </div>`;
        const activeTab = window._homeTab || "posts";
        if (activeTab === "posts") {
            html += `<div><button id="createPostBtn" style="margin-bottom: 14px; background:#0f3b2c;"><i class="fas fa-plus-circle"></i> Create new post</button></div>`;
            communityPosts.forEach(post => {
                html += `<div class="post-card">
                            <div class="post-header">
                                <div class="avatar">${post.avatar}</div>
                                <div><div class="user-name">${post.userName}</div><div class="circle-badge"><i class="fas fa-circle-nodes"></i> ${post.circle}</div></div>
                            </div>
                            <div class="post-text">${post.text}</div>
                            <div class="post-stats">
                                <span><i class="far fa-heart"></i> ${post.likes}</span>
                                <span><i class="far fa-comment"></i> ${post.comments}</span>
                                <span>${post.timestamp}</span>
                            </div>
                            <div class="input-row">
                                <input type="text" placeholder="Write a comment..." id="commentInput-${post.id}">
                                <button class="reply-btn" data-postid="${post.id}">Reply</button>
                            </div>
                        </div>`;
            });
        } else {
            // Join Circle tab: search & random relevant circles
            html += `<div class="search-circle">
                        <i class="fas fa-search"></i>
                        <input type="text" id="circleSearchInput" placeholder="Search circle by name...">
                    </div>
                    <div id="circleSearchResults"></div>
                    <h4>✨ Recommended for you</h4>
                    <div id="recommendedCircles"></div>`;
            // populate recommended & search logic later
            setTimeout(() => {
                const recommended = ["Johar Town", "Clifton Block 8", "PECHS", "Gulistan-e-Jauhar"];
                const container = document.getElementById("recommendedCircles");
                if(container) container.innerHTML = recommended.map(c => `<div class="circle-item"><span><i class="fas fa-map-marker-alt"></i> ${c}</span><button class="join-btn" data-circle="${c}">Join</button></div>`).join('');
                const searchInput = document.getElementById("circleSearchInput");
                if(searchInput) {
                    searchInput.addEventListener("input", (e) => {
                        const val = e.target.value.toLowerCase();
                        const filtered = recommended.filter(c => c.toLowerCase().includes(val));
                        const resultsDiv = document.getElementById("circleSearchResults");
                        if(resultsDiv) resultsDiv.innerHTML = filtered.map(c => `<div class="circle-item"><span>${c}</span><button class="join-btn" data-circle="${c}">Join</button></div>`).join('');
                    });
                }
                document.querySelectorAll(".join-btn").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        alert(`You joined ${btn.getAttribute("data-circle")} circle! (Demo)`);
                    });
                });
            }, 10);
        }
        return html;
    }

    // Meetup tab: Chats & Find friend (two top tabs)
    let meetupSubTab = "chats";
    function renderMeetup() {
        let html = `<div class="top-tabs" id="meetupTopTabs">
                        <button class="top-tab-btn ${meetupSubTab === 'chats' ? 'active' : ''}" data-meetup-tab="chats">Chats</button>
                        <button class="top-tab-btn ${meetupSubTab === 'friends' ? 'active' : ''}" data-meetup-tab="friends">Find Friend</button>
                    </div>`;
        if (meetupSubTab === "chats") {
            chatList.forEach(chat => {
                html += `<div class="chat-card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; gap:12px;"><div class="avatar" style="width:48px; height:48px;">${chat.avatar}</div>
                            <div><strong>${chat.name}</strong><div style="font-size:13px; color:#475569;">${chat.lastMsg}</div></div></div>
                            <div style="text-align:right;"><span style="font-size:11px;">${chat.time}</span>${chat.unread>0? `<span style="background:#0f3b2c; color:white; border-radius:20px; padding:2px 8px; margin-left:6px;">${chat.unread}</span>`:''}</div>
                        </div>`;
            });
        } else {
            friendSuggestions.forEach(f => {
                html += `<div class="friend-card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; gap:12px;"><div class="avatar">${f.avatar}</div><div><strong>${f.name}</strong><div style="font-size:12px;">${f.mutualCircle}</div></div></div>
                            <button class="add-friend-btn" data-friend="${f.name}" style="background:#0f3b2c; padding:6px 12px;">Add</button>
                        </div>`;
            });
        }
        return html;
    }

    // Quick Get: three top tabs: location specific, circle+followed questions, ask question
    let quickSubTab = "location";
    function renderQuickGet() {
        let html = `<div class="top-tabs" id="quickTopTabs">
                        <button class="top-tab-btn ${quickSubTab === 'location' ? 'active' : ''}" data-quick-tab="location">📍 Location Q</button>
                        <button class="top-tab-btn ${quickSubTab === 'circle' ? 'active' : ''}" data-quick-tab="circle">🏠 Circle Q</button>
                        <button class="top-tab-btn ${quickSubTab === 'ask' ? 'active' : ''}" data-quick-tab="ask">❓ Ask</button>
                    </div>`;
        if (quickSubTab === "location") {
            locationSpecificQuestions.forEach(q => {
                html += `<div class="question-card">
                            <div class="question-header"><div class="avatar">📍</div><div><strong>${q.title}</strong><div style="font-size:12px;">📍 ${q.location} • asked by ${q.askedBy} • ${q.timeAgo}</div></div></div>
                            <div class="post-stats">${q.answers} answers</div>
                            <div class="input-row"><input placeholder="Your answer (with photo/GPS mock)..." id="ansLoc-${q.id}"><button class="reply-to-q" data-qid="${q.id}">Reply</button></div>
                        </div>`;
            });
        } else if (quickSubTab === "circle") {
            circleMemberQuestions.forEach(q => {
                html += `<div class="question-card">
                            <div><span class="circle-badge"><i class="fas fa-circle"></i> ${q.circle}</span><span style="margin-left: 8px; font-size:12px;">by ${q.askedBy}, ${q.timeAgo}</span></div>
                            <div class="post-text"><strong>❓ ${q.question}</strong></div>
                            <div class="post-stats">💬 ${q.replies} replies</div>
                            <div class="input-row"><input placeholder="Reply to this question..." id="replyCircle-${q.id}"><button class="reply-circle-q" data-qid="${q.id}">Reply</button></div>
                        </div>`;
            });
        } else {
            html += `<div class="ask-card">
                        <textarea id="newQuestionText" rows="2" placeholder="Type your question... (e.g., What's the traffic situation on Mall road?)" style="width:100%; border-radius:20px; padding:12px; border:1px solid #e2e8f0;"></textarea>
                        <div style="margin: 10px 0;"><button id="askLocationToggleBtn" style="background:#e2e8f0; color:#1e293b;">📍 Attach location (free)</button></div>
                        <input type="text" id="questionLocation" placeholder="Optional: add place name (Anarkali / Kalma Chowk)" style="width:100%; margin-bottom:12px;">
                        <button id="submitQuestionBtn">Ask Question (free, uses daily limit)</button>
                        <p style="font-size:12px; margin-top:8px;">📌 Free: first 10 questions/day. Extra questions cost 10 points each.</p>
                    </div>`;
        }
        return html;
    }

    function renderNotifications() {
        let html = `<h3 style="margin-bottom:12px;">🔔 Notifications</h3>`;
        notificationsList.forEach(notif => {
            html += `<div class="notification-item"><i class="fas fa-bell" style="margin-right:12px; color:#0f3b2c;"></i> ${notif.text}<div style="font-size:11px; color:#94a3b8;">${notif.time}</div></div>`;
        });
        return html;
    }

    function renderProfile() {
        return `<div class="profile-section">
                    <div class="avatar" style="width:80px; height:80px; margin: 0 auto 12px; font-size:28px;">${currentUser.avatar}</div>
                    <h2>${currentUser.name}</h2>
                    <div class="points-badge"><i class="fas fa-coins"></i> ${currentUser.points} points</div>
                    <div>⭐ Trust Score: ${currentUser.trustScore}</div>
                    <div><i class="fas fa-circle-nodes"></i> Home Circle: ${currentUser.circle}</div>
                    <hr style="margin:16px 0;">
                    <button id="upgradePremiumBtn" style="background:#c2410c;">✨ Upgrade Premium (Rs 1000/mo)</button>
                    <div style="margin-top:16px; text-align:left;">
                        <h4>Stats</h4>
                        <p>✅ Answers given: 47</p>
                        <p>🏆 Weekly streak: 12 days</p>
                        <p>❤️ Thanks received: 23</p>
                    </div>
                    <footer>Apki awaz hai kisi ka sahara</footer>
                </div>`;
    }

    // Global render based on active main tab
    let activeMainTab = "home";
    function renderAll() {
        const container = document.getElementById("dynamicPanel");
        if (!container) return;
        let content = "";
        if (activeMainTab === "home") content = renderHome();
        else if (activeMainTab === "meetup") content = renderMeetup();
        else if (activeMainTab === "quickget") content = renderQuickGet();
        else if (activeMainTab === "notifications") content = renderNotifications();
        else if (activeMainTab === "profile") content = renderProfile();
        container.innerHTML = content;
        attachTabEventListeners();
        attachDynamicButtons();
    }

    function attachTabEventListeners() {
        // home inner tabs (add post / join circle)
        const homePostBtn = document.querySelector("[data-home-tab='posts']");
        const homeCircleBtn = document.querySelector("[data-home-tab='circles']");
        if (homePostBtn && homeCircleBtn) {
            homePostBtn.onclick = () => { window._homeTab = "posts"; renderAll(); };
            homeCircleBtn.onclick = () => { window._homeTab = "circles"; renderAll(); };
        }
        // meetup inner tabs
        const meetupChats = document.querySelector("[data-meetup-tab='chats']");
        const meetupFriends = document.querySelector("[data-meetup-tab='friends']");
        if (meetupChats) meetupChats.onclick = () => { meetupSubTab = "chats"; renderAll(); };
        if (meetupFriends) meetupFriends.onclick = () => { meetupSubTab = "friends"; renderAll(); };
        // Quick get tabs
        const locTab = document.querySelector("[data-quick-tab='location']");
        const circTab = document.querySelector("[data-quick-tab='circle']");
        const askTab = document.querySelector("[data-quick-tab='ask']");
        if (locTab) locTab.onclick = () => { quickSubTab = "location"; renderAll(); };
        if (circTab) circTab.onclick = () => { quickSubTab = "circle"; renderAll(); };
        if (askTab) askTab.onclick = () => { quickSubTab = "ask"; renderAll(); };
    }

    function attachDynamicButtons() {
        // reply to location questions
        document.querySelectorAll(".reply-to-q").forEach(btn => {
            btn.onclick = (e) => {
                const qid = btn.getAttribute("data-qid");
                alert(`Mock: Your answer recorded for location question #${qid}. +points after rating (demo).`);
            };
        });
        document.querySelectorAll(".reply-circle-q").forEach(btn => {
            btn.onclick = () => alert("Reply sent to circle question! (demo)");
        });
        const submitQuestion = document.getElementById("submitQuestionBtn");
        if (submitQuestion) {
            submitQuestion.onclick = () => {
                const questionText = document.getElementById("newQuestionText")?.value;
                const location = document.getElementById("questionLocation")?.value;
                if (!questionText) return alert("Please write a question.");
                alert(`Question posted: "${questionText}" ${location ? '📍 at '+location : ''}\n(limit check: free within 10/day, after 10 costs points). Demo added.`);
                // In real scenario: update ui
                document.getElementById("newQuestionText").value = '';
            };
        }
        const createPost = document.getElementById("createPostBtn");
        if (createPost) {
            createPost.onclick = () => {
                let newPostText = prompt("Write your community post:");
                if (newPostText) alert(`Post added to ${currentUser.circle} circle (demo).`);
            };
        }
        document.querySelectorAll(".add-friend-btn").forEach(btn => {
            btn.onclick = (e) => {
                const name = btn.getAttribute("data-friend");
                alert(`Friend request sent to ${name}!`);
            };
        });
        const premiumBtn = document.getElementById("upgradePremiumBtn");
        if (premiumBtn) premiumBtn.onclick = () => alert("Premium subscription coming soon. Unlimited questions, no ads, +benefits.");
    }

    // bottom tab switch
    document.querySelectorAll(".tab-item").forEach(tab => {
        tab.addEventListener("click", (e) => {
            const tabName = tab.getAttribute("data-tab");
            if (tabName) {
                activeMainTab = tabName;
                document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                renderAll();
            }
        });
    });

    // initial render
    document.querySelector(".tab-item[data-tab='home']").classList.add("active");
    renderAll();
</script>
</body>
</html>
