            justify-content: center;

            padding: 16px;
        }
        .phone {
            max-width: 380px;
            width: 100%;
            height: 700px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .status-bar {

            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            background: white;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }
        /* 5 tabs with smaller icons */
        .bottom-tabs {
            display: flex;
            justify-content: space-around;
            background: white;
            border-top: 1px solid #e9eef3;
            padding: 6px 8px 12px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            color: #8e9aaf;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            flex: 1;
            text-align: center;
        }
        .tab-item i { font-size: 18px; }
        .tab-item.active { color: #0f3b2c; }
        .top-tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1.5px solid #eef2f8;
            margin-bottom: 18px;
            padding-bottom: 6px;
        }
        .top-tab-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #6c7a91;
            padding: 6px 0;
            cursor: pointer;
            position: relative;
        }
        .top-tab-btn.active { color: #0f3b2c; }
        .top-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 0;
            width: 100%;
            height: 2.5px;
            background: #0f3b2c;
            border-radius: 2px;
        }
        /* Post cards */
        .post-card, .product-card, .order-card, .event-card, .question-card, .chat-card, .friend-card, .circle-item-card {
            background: white;
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #edf2f7;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: #e3f5ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0f3b2c;
        }
        .post-img {
            width: 100%;
            border-radius: 20px;
            margin: 10px 0;
            max-height: 180px;
            object-fit: cover;
        }
        .event-badge {
            background: #fef3c7;
            color: #b45309;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .product-price { font-weight: 700; color: #0f3b2c; font-size: 16px; }
        .order-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-shipped { background: #dbeafe; color: #1e40af; }
        .status-delivered { background: #d1fae5; color: #065f46; }
        .marketplace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        button {
            background: #0f3b2c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .circle-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .join-btn {
            background: transparent;
            border: 1px solid #0f3b2c;
            color: #0f3b2c;
        }
        .search-circle {
            background: #f8fafc;
            border-radius: 40px;
            padding: 10px 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            border: 1px solid #e2edf7;
        }
        /* Separate ad card */
        .ad-card {
            background: #fef9e3;
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 16px;
            border-left: 4px solid #f59e0b;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .ad-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #b45309;
        }
        .ad-label {
            background: #fde68a;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .ad-image {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 10px;
            max-height: 140px;
            object-fit: cover;
        }
        .ad-cta {
            background: #f59e0b;
            width: 100%;
            margin-top: 8px;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            cursor: pointer;
        }
        footer {
            font-size: 10px;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }
    </style>
</head>

    // Helper to inject separate ad cards between posts
    function injectAdsBetweenPosts(contentHtml) {
        let ad1 = `<div class="ad-card">
                    <div class="ad-header"><i class="fas fa-ad"></i><span class="ad-label">Sponsored</span></div>
                    <img src="${ads[0].image}" class="ad-image">

        let ad2 = `<div class="ad-card">
                    <div class="ad-header"><i class="fas fa-ad"></i><span class="ad-label">Sponsored</span></div>
                    <img src="${ads[1].image}" class="ad-image">
                    <div class="ad-content"><strong>${ads[1].business}</strong><p>${ads[1].text}</p></div>
                    <button class="ad-cta">${ads[1].cta}</button>
                   </div>`;
        let parts = contentHtml.split('</div>');
        if (parts.length > 2) {
            let firstTwo = parts.slice(0,2).join('</div>');
            let rest = parts.slice(2).join('</div>');
            return firstTwo + ad1 + rest.replace(/(<div class="post-card")/, ad2 + '$1');
        }
        return contentHtml + ad1 + ad2;
    }

                    <input id="circleSearch" placeholder="Search circle...">
                </div>
                <div id="circleList"></div>`;
        setTimeout(() => {
            const container = document.getElementById("circleList");
            if (container) {
                container.innerHTML = allCircles.map(c => `
                    <div class="circle-item">
                        <span><i class="fas fa-map-marker-alt"></i> ${c}</span>
                        <button class="join-circle" data-circle="${c}">Join</button>
                    </div>
                `).join('');
            }
            document.querySelectorAll(".join-circle").forEach(btn => {
                btn.onclick = () => alert(`Joined ${btn.dataset.circle}`);
            });
            const searchInput = document.getElementById("circleSearch");
            if (searchInput) {
                searchInput.addEventListener("input", (e) => {
                    let term = e.target.value.toLowerCase();
                    let filtered = allCircles.filter(c => c.toLowerCase().includes(term));
                    document.getElementById("circleList").innerHTML = filtered.map(c => `
                        <div class="circle-item">
                            <span>${c}</span>
                            <button class="join-circle" data-circle="${c}">Join</button>

                    `).join('');
                });
            }
        }, 10);

    else { // eventsmedia

        });

    }
    return html;
}

                html += `<div class="chat-card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; gap:12px;"><div class="avatar">${chat.avatar}</div><div><strong>${chat.name}</strong><div style="font-size:13px;">${chat.lastMsg}</div></div></div>
                            <div>${chat.unread ? `<span style="background:#0f3b2c; padding:2px 8px; border-radius:20px;">${chat.unread}</span>` : `<span style="font-size:11px;">${chat.time}</span>`}</div>
                        </div>`;
            });
        } else {
            friendSuggestions.forEach(f => {
                html += `<div class="friend-card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; gap:12px;"><div class="avatar">${f.avatar}</div><div><strong>${f.name}</strong><div style="font-size:12px;">${f.mutualCircle}</div></div></div>
                            <button class="addFriendBtn" data-name="${f.name}">Add Friend</button>
                        </div>`;
            });
        }
        return html;
    }

    function renderQuickGet() {
        let html = `<div class="top-tabs"><button class="top-tab-btn ${quickSubTab === 'location' ? 'active' : ''}" data-quick-tab="location">📍 Location Q</button><button class="top-tab-btn ${quickSubTab === 'circle' ? 'active' : ''}" data-quick-tab="circle">🏠 Circle Q</button><button class="top-tab-btn ${quickSubTab === 'ask' ? 'active' : ''}" data-quick-tab="ask">❓ Ask</button></div>`;
        if (quickSubTab === "location") {
            locationSpecificQuestions.forEach(q => {
                html += `<div class="question-card"><strong>${q.title}</strong><div style="font-size:12px;">📍 ${q.location} • ${q.timeAgo}</div><div class="post-stats">${q.answers} answers</div><div class="input-row"><input placeholder="Your answer..."><button class="answerQ">Reply</button></div></div>`;
            });
        } else if (quickSubTab === "circle") {
            circleMemberQuestions.forEach(q => {
                html += `<div class="question-card"><div><span class="circle-badge">${q.circle}</span> • ${q.question}</div><div class="post-stats">${q.replies} replies</div><div class="input-row"><input placeholder="Reply..."><button class="answerCircle">Reply</button></div></div>`;
            });
        } else {
            html += `<div class="post-card"><textarea id="newQ" rows="2" placeholder="Ask anything (free 10/day)..."></textarea><button id="askBtn">Ask Question</button><p style="font-size:12px; margin-top:8px;">First 10 free, then 10 points each.</p></div>`;
        }
        return html;
    }

    function renderMarket() {
        let html = `<div class="top-tabs"><button class="top-tab-btn ${marketSubTab === 'products' ? 'active' : ''}" data-market-tab="products">🛍️ Products</button><button class="top-tab-btn ${marketSubTab === 'orders' ? 'active' : ''}" data-market-tab="orders">📦 My Orders</button></div>`;
        if (marketSubTab === "products") {
            html += `<div class="marketplace-grid">`;
            products.forEach(p => {
                html += `<div class="product-card"><img src="${p.image}" style="width:100%; border-radius:16px; height:130px; object-fit:cover;"><h4>${p.name}</h4><div class="product-price">Rs ${p.price}</div><div style="font-size:12px;">${p.business}</div><button class="order-product" data-name="${p.name}" data-price="${p.price}">Order Now</button></div>`;
            });
            html += `</div>`;
        } else {
            orders.forEach(o => {
                let statusClass = o.status === 'pending' ? 'status-pending' : (o.status === 'shipped' ? 'status-shipped' : 'status-delivered');
                html += `<div class="order-card"><div><strong>Order #${o.id}</strong> <span class="order-status ${statusClass}">${o.status.toUpperCase()}</span></div><div>${o.productName} x ${o.quantity}</div><div>Total: Rs ${o.total}</div><div>${o.date}</div></div>`;
            });
        }
        return html;
    }

    function renderProfile() {
        let notifCount = notificationsList.length;
        return `<div class="post-card" style="text-align:center;">
                    <div class="avatar" style="margin:0 auto;">${currentUser.avatar}</div>
                    <h2>${currentUser.name}</h2>
                    <div>⭐ ${currentUser.points} pts | Trust ${currentUser.trustScore}</div>
                    <div><i class="fas fa-circle-nodes"></i> ${currentUser.circle}</div>
                    <hr style="margin:16px 0;">
                    <div class="settings-item" id="showNotif"><span><i class="fas fa-bell"></i> Notifications</span><span style="background:#e53e3e; color:white; padding:2px 8px; border-radius:20px;">${notifCount}</span></div>
                    <div class="settings-item"><span><i class="fas fa-user-edit"></i> Edit Profile</span><i class="fas fa-chevron-right"></i></div>
                    <div class="settings-item"><span><i class="fas fa-lock"></i> Privacy & Security</span><i class="fas fa-chevron-right"></i></div>
                    <button id="premiumBtn" style="margin-top:16px;">✨ Upgrade Premium (Rs 1000/mo)</button>
                    <footer>Apki awaz hai kisi ka sahara</footer>
                </div>`;
    }

    function renderAll() {
        const container = document.getElementById("mainContent");
        if (!container) return;
        let content = "";
        if (activeMainTab === "home") content = renderHome();
        else if (activeMainTab === "meetup") content = renderMeetup();
        else if (activeMainTab === "quickget") content = renderQuickGet();
        else if (activeMainTab === "market") content = renderMarket();
        else if (activeMainTab === "profile") content = renderProfile();
        container.innerHTML = content;
        attachDynamicEvents();
    }

    function attachDynamicEvents() {
        document.querySelectorAll("[data-home-tab]").forEach(btn => btn.addEventListener("click", (e) => { homeSubTab = e.target.dataset.homeTab; renderAll(); }));
        document.querySelectorAll("[data-meetup-tab]").forEach(btn => btn.addEventListener("click", (e) => { meetupSubTab = e.target.dataset.meetupTab; renderAll(); }));
        document.querySelectorAll("[data-quick-tab]").forEach(btn => btn.addEventListener("click", (e) => { quickSubTab = e.target.dataset.quickTab; renderAll(); }));
        document.querySelectorAll("[data-market-tab]").forEach(btn => btn.addEventListener("click", (e) => { marketSubTab = e.target.dataset.marketTab; renderAll(); }));
        document.getElementById("createTextPostBtn")?.addEventListener("click", () => { let txt = prompt("Write your text update:"); if(txt) { textOnlyPosts.unshift({ id: Date.now(), circle: currentUser.circle, userName: currentUser.name, avatar: currentUser.avatar, text: txt, likes: 0, comments: 0, timestamp: "just now" }); renderAll(); } });
        document.querySelectorAll(".reply-post, .answerQ, .answerCircle").forEach(btn => btn.addEventListener("click", () => alert("Reply posted (demo). Points awarded after rating.")));
        document.getElementById("askBtn")?.addEventListener("click", () => alert("Question posted (free if under daily limit)."));
        document.querySelectorAll(".addFriendBtn").forEach(btn => btn.addEventListener("click", (e) => alert(`Friend request sent to ${btn.dataset.name}`)));
        document.querySelectorAll(".order-product").forEach(btn => btn.addEventListener("click", (e) => { let name = btn.dataset.name; let price = parseInt(btn.dataset.price); let qty = prompt("Quantity:", "1"); if(qty) alert(`Order placed for ${name} x${qty} (total Rs ${price*parseInt(qty)}). Status: pending.`); }));
        document.getElementById("premiumBtn")?.addEventListener("click", () => alert("Upgrade to premium: unlimited questions, no ads, bonus points."));
        document.getElementById("showNotif")?.addEventListener("click", () => alert("🔔 Notifications:\n" + notificationsList.map(n => n.text + " (" + n.time + ")").join("\n")));
    }

    // Bottom tab listeners
    document.querySelectorAll(".tab-item").forEach(tab => {
        tab.addEventListener("click", () => {
            activeMainTab = tab.dataset.tab;
            document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            renderAll();
        });
    });
    document.querySelector(".tab-item[data-tab='home']").classList.add("active");
    renderAll();
</script>
</body>
</html>
